[tox]
envlist = py{38,39,310,311,312,313}
minversion = 4.0
isolated_build = true

[testenv]
extras =
    test
commands =
    pytest {posargs:tests}

[testenv:lint]
skip_install = true
deps =
    flake8
commands =
    flake8 src tests examples

[testenv:manifest]
skip_install = true
deps =
    check-manifest >= 0.42
commands =
    check-manifest --ignore 'tox.ini,tests/**,.github/**,docs/**,examples/**'

[testenv:build]
skip_install = true
deps =
    build
    twine
commands =
    python -I -m build --sdist --wheel --outdir {toxworkdir}/dist .
    python -m twine check {toxworkdir}/dist/*

[flake8]
exclude = .tox,*.egg,build,data,versioneer.py,src/kalmankit/_version.py
select = E,W,F
max-line-length = 88
